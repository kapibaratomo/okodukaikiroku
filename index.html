<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お小遣い記録</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>同期中...</p>
    </div>

    <div class="container">
        <header>
            <div class="header-top">
                <h1>お小遣い記録</h1>
                <button id="settingsBtn" class="icon-btn" title="設定">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
            <div class="balance-cards">
                <div class="card-group">
                    <div class="card pasmo">
                        <span class="label">PASMO</span>
                        <span class="amount" id="pasmoBalance">¥0</span>
                    </div>
                    <div class="card cash">
                        <span class="label">現金</span>
                        <span class="amount" id="cashBalance">¥0</span>
                    </div>
                </div>
            </div>
        </header>

        <section class="add-transaction">
            <h2>記録を追加</h2>
            <form id="transactionForm">
                <div class="form-group toggle-group">
                    <input type="radio" id="typePasmo" name="type" value="pasmo" checked>
                    <label for="typePasmo" class="toggle-btn toggle-pasmo">PASMO</label>
                    
                    <input type="radio" id="typeCash" name="type" value="cash">
                    <label for="typeCash" class="toggle-btn toggle-cash">現金</label>
                </div>
                
                <div class="form-group toggle-group">
                    <input type="radio" id="catIncome" name="category" value="income">
                    <label for="catIncome" class="toggle-btn toggle-income">収入 (+)</label>
                    
                    <input type="radio" id="catExpense" name="category" value="expense" checked>
                    <label for="catExpense" class="toggle-btn toggle-expense">支出 (-)</label>
                </div>

                <div class="form-group">
                    <input type="datetime-local" id="transactionDate" required>
                </div>

                <div class="form-group">
                    <input type="number" id="amount" placeholder="金額 (円)" required min="1">
                </div>

                <div class="form-group">
                    <input type="text" id="memo" placeholder="メモ (例: ジュース)" required>
                </div>

                <button type="submit" class="btn-submit">追加する</button>
            </form>
        </section>

        <section class="history">
            <div class="history-header">
                <h2>履歴</h2>
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">すべて</button>
                    <button class="filter-btn" data-filter="pasmo">PASMO</button>
                    <button class="filter-btn" data-filter="cash">現金</button>
                </div>
            </div>
            
            <ul id="historyList" class="history-list">
                <!-- 履歴がここに追加されます -->
            </ul>
        </section>

        <section id="settingsSection" class="data-management hidden">
            <h2>GitHub同期設定</h2>
            <p class="help-text">自動同期のためにはPersonal Access Tokenが必要です。</p>
            <div class="form-group">
                <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxxxxxxx">
            </div>
            <div class="data-actions">
                <button id="saveTokenBtn" class="btn-outline">
                    設定を保存して同期
                </button>
            </div>
            <div id="syncStatus" class="sync-status text-sm mt-3 text-center">
                <!-- ステータスメッセージ -->
            </div>
        </section>
    </div>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
